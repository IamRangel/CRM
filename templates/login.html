<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Login CRM</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

    <link rel="icon" type="image/png" href="{{ url_for('static', filename='img/logo_aba.png') }}">
</head>
<body>

<div class="auth-container">
    <div class="auth-card">

        <h2 class="auth-title">LOGIN</h2>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                <div class="auth-alert {{ messages[0][0] }}">
                    {{ messages[0][1] }}
                </div>
            {% endif %}
        {% endwith %}

        <form method="POST">
            <input type="text" name="username" placeholder="Usuário" class="auth-input" required>
            <input type="password" name="password" placeholder="Senha" class="auth-input" required>

            <button type="submit" class="auth-button">Entrar</button>
        </form>

        <a href="{{ url_for('cadastro') }}" class="auth-link">
            Criar novo usuário
        </a>

    </div>
</div>

</body>
</html>
